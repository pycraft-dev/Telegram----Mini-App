<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Запись на мастер-класс</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <main class="app">
    <header class="header">
      <h1 class="title">Запись</h1>
      <p class="subtitle" id="subtitle">Загрузка…</p>
    </header>

    <section id="card" class="card hidden">
      <div class="card__media" id="mcPhoto"></div>
      <div class="card__body">
        <h2 id="mcName" class="card__title"></h2>
        <p id="mcMeta" class="card__meta"></p>
        <p id="mcDesc" class="card__desc"></p>
      </div>
    </section>

    <section class="form-section">
      <label class="label" for="slot">Дата и время</label>
      <select id="slot" class="input" disabled></select>

      <label class="label" for="name">Имя</label>
      <input id="name" class="input" type="text" autocomplete="name" />

      <label class="label" for="phone">Телефон</label>
      <input id="phone" class="input" type="tel" autocomplete="tel" />

      <p id="error" class="error hidden" role="alert"></p>

      <button id="submit" class="btn" type="button">Подтвердить бронь</button>
      <p id="status" class="status hidden"></p>
    </section>
  </main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
