version: '3.8'

services:
  api:
    build: .
    container_name: demo_api
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/demo.db

  bot:
    build: .
    container_name: demo_bot
    command: python main.py
    restart: unless-stopped
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/demo.db
    depends_on:
      - api
